<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Propel My Life — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background:
      radial-gradient(110% 80% at 80% -10%, rgba(155,107,255,.22), transparent 55%),
      radial-gradient(100% 70% at -10% 10%, rgba(91,141,239,.18), transparent 52%),
      radial-gradient(120% 90% at 60% 120%, rgba(255,107,193,.12), transparent 55%),
      linear-gradient(180deg, #0a0814, #07060f);
    min-height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Manrope', system-ui, sans-serif;
  }
  #stage {
    width: min(390px, 100vw);
    height: min(844px, 100vh);
    position: relative;
    border-radius: 40px;
    overflow: hidden;
    background: #0c0a16;
    box-shadow: 0 40px 100px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06), 0 0 0 11px rgba(20,16,32,.9), 0 0 0 12px rgba(255,255,255,.04);
  }
  @media (max-width: 440px) {
    #stage { border-radius: 0; box-shadow: none; height: 100vh; }
  }
  #root { width: 100%; height: 100%; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  @keyframes pl-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pl-up { from { transform: translateY(40px); opacity: .6; } to { transform: translateY(0); opacity: 1; } }
  input::placeholder { color: rgba(238,240,251,.32); }
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="propel-ui.jsx"></script>
<script type="text/babel" src="propel-app.jsx"></script>
<script type="text/babel" src="propel-screens.jsx"></script>
<script type="text/babel" src="propel-main.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<PropelApp />);
</script>
</body>
</html>
