<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Propel My Life — Design Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="propel-ui.jsx"></script>
<script type="text/babel" src="propel-home.jsx"></script>
<script type="text/babel" src="propel-modules-a.jsx"></script>
<script type="text/babel" src="propel-modules-b.jsx"></script>
<script type="text/babel" src="propel-desktop.jsx"></script>

<script type="text/babel">
const { THEMES } = window;
const E = THEMES.aurora;
const PW = 384;
const PB = { borderRadius: 30 }; // phone device corners

function App() {
  return (
    <DesignCanvas>
      <DCSection id="home" title="Home · Dashboard" subtitle="Three directions — these also preview your Dark/Light & accent tweaks">
        <DCArtboard id="ember" label="A · Ember — dark warm (your accent)" width={PW} height={1210} style={PB}><HomeScreen theme={THEMES.ember} name="Rich" /></DCArtboard>
        <DCArtboard id="daylight" label="B · Daylight — light & calm" width={PW} height={1210} style={PB}><HomeScreen theme={THEMES.daylight} name="Rich" /></DCArtboard>
        <DCArtboard id="aurora" label="C · Aurora — high glow (reference homage)" width={PW} height={1210} style={PB}><HomeScreen theme={THEMES.aurora} name="Rich" /></DCArtboard>
      </DCSection>

      <DCSection id="modules" title="The App, End to End" subtitle="Every core module — mobile, in the Aurora direction">
        <DCArtboard id="habits" label="Daily Habits" width={PW} height={900} style={PB}><HabitsScreen theme={E} /></DCArtboard>
        <DCArtboard id="reminders" label="Reminder Centre" width={PW} height={1220} style={PB}><ReminderScreen theme={E} /></DCArtboard>
        <DCArtboard id="goals" label="Goals & Vision" width={PW} height={1030} style={PB}><GoalsScreen theme={E} /></DCArtboard>
        <DCArtboard id="health" label="Health" width={PW} height={810} style={PB}><HealthScreen theme={E} /></DCArtboard>
        <DCArtboard id="wealth" label="Wealth" width={PW} height={905} style={PB}><WealthScreen theme={E} /></DCArtboard>
        <DCArtboard id="peace" label="Peacefulness" width={PW} height={1020} style={PB}><PeaceScreen theme={E} /></DCArtboard>
        <DCArtboard id="study" label="Study" width={PW} height={850} style={PB}><StudyScreen theme={E} /></DCArtboard>
        <DCArtboard id="gratitude" label="Good News & Gratitude" width={PW} height={775} style={PB}><GratitudeScreen theme={E} /></DCArtboard>
        <DCArtboard id="people" label="People & Events" width={PW} height={960} style={PB}><PeopleScreen theme={E} /></DCArtboard>
      </DCSection>

      <DCSection id="desktop" title="On the Big Screen" subtitle="Responsive web app — Monday/Notion-style tasks, Gmail + Google Calendar">
        <DCArtboard id="dt-dash" label="Desktop · Dashboard" width={1320} height={860} style={{ borderRadius: 16 }}><DesktopDashboard theme={E} /></DCArtboard>
        <DCArtboard id="dt-tasks" label="Desktop · Tasks (Monday × Notion)" width={1320} height={860} style={{ borderRadius: 16 }}><TasksScreen theme={E} /></DCArtboard>
        <DCArtboard id="dt-rem" label="Desktop · Reminder Centre" width={1320} height={860} style={{ borderRadius: 16 }}><ReminderDesktop theme={E} /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
